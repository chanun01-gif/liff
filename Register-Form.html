<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนพนักงาน</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Noto Sans Thai', sans-serif; background: #F8F6F0; color: #1F2937; }
    header { background: #0D1B3E; color: #fff; padding: 24px 18px; }
    h1 { margin: 0; color: #C5A55A; font-size: 24px; }
    main { max-width: 520px; margin: 0 auto; padding: 18px; }
    .section { background: #fff; border: 1px solid #E5E3DC; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    label { display: block; font-size: 13px; font-weight: 700; color: #6B7280; margin: 12px 0 6px; }
    input { width: 100%; border: 1.5px solid #E5E3DC; border-radius: 8px; padding: 12px; font: inherit; }
    input:focus { outline: none; border-color: #C5A55A; box-shadow: 0 0 0 3px rgba(197,165,90,.15); }
    button { width: 100%; border: 0; border-radius: 8px; padding: 14px; background: #8B7340; color: white; font: inherit; font-weight: 800; }
    .hint { font-size: 12px; color: #6B7280; line-height: 1.5; }
    .toast { display:none; margin-top: 12px; padding: 12px; border-radius: 8px; background: #C0392B; color: white; }
    .success { display:none; text-align:center; background:#fff; border-radius:8px; padding:28px 18px; border:1px solid #E5E3DC; }
  </style>
</head>
<body>
  <header>
    <h1>ลงทะเบียนพนักงาน</h1>
    <div class="hint">ระบบจะผูก LINE User ID กับข้อมูลพนักงาน</div>
  </header>
  <main>
    <form id="form" class="section">
      <label>รหัสพนักงาน</label>
      <input id="employeeId" placeholder="เช่น EMP001">
      <label>ชื่อ-นามสกุล</label>
      <input id="name" required>
      <label>แผนก / ส่วนงาน</label>
      <input id="department" required>
      <label>LINE User ID หัวหน้า</label>
      <input id="managerUserId" placeholder="ขึ้นต้นด้วย U">
      <label>LINE User ID ผู้อนุมัติระดับ 2</label>
      <input id="secondManagerUserId" placeholder="ถ้ามี">
      <label>อีเมล</label>
      <input id="email" type="email">
      <label>เบอร์โทร</label>
      <input id="phone">
      <p class="hint">ยอดวันลาเริ่มต้นใช้ค่าที่ตั้งใน CONFIG ถ้า HR ต้องการปรับ ให้แก้ใน Sheet ได้โดยตรง</p>
      <button type="submit">บันทึกข้อมูล</button>
      <div class="toast" id="toast"></div>
    </form>
    <div class="success" id="success">
      <h2>ลงทะเบียนสำเร็จ</h2>
      <p class="hint">กลับไปใช้งานระบบลาใน LINE ได้เลย</p>
    </div>
  </main>
  <script>
    const LIFF_ID = '2010068016-uNZ0EWnx';
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbwiyiHLBmxffS68x0EttCzdCRpJT4RkGSx9o0LHICny3l9DbYPK0gdfteHEUDRZnZJr/exec';
    let lineUserId = new URLSearchParams(location.search).get('userId') || '';

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) return liff.login();
        const profile = await liff.getProfile();
        lineUserId = profile.userId || lineUserId;
        document.getElementById('name').value = profile.displayName || '';
      } catch (err) {
        lineUserId = lineUserId || 'TEST_USER';
      }
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const payload = {
        source: 'liff',
        action: 'register',
        userId: lineUserId,
        employeeId: val('employeeId'),
        name: val('name'),
        department: val('department'),
        managerUserId: val('managerUserId'),
        secondManagerUserId: val('secondManagerUserId'),
        email: val('email'),
        phone: val('phone')
      };
      try {
        const res = await fetch(GAS_WEB_APP_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify(payload) });
        const result = await res.json();
        if (!result.success) throw new Error(result.message || 'บันทึกไม่สำเร็จ');
        document.getElementById('form').style.display = 'none';
        document.getElementById('success').style.display = 'block';
      } catch (err) {
        const toast = document.getElementById('toast');
        toast.textContent = err.message || String(err);
        toast.style.display = 'block';
      }
    });

    function val(id) { return document.getElementById(id).value.trim(); }
    init();
  </script>
</body>
</html>
