<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ระบบลาออนไลน์</title>
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:       #0D1B3E;
      --royal:      #1E3A6E;
      --gold:       #C5A55A;
      --gold-pale:  #FBF4E4;
      --gold-dark:  #8B7340;
      --green:      #2D8B4E;
      --green-bg:   #E8F5ED;
      --red:        #C0392B;
      --red-bg:     #FEE2E2;
      --orange:     #D4880F;
      --orange-bg:  #FEF6E3;
      --gray-50:    #FAFAF8;
      --gray-100:   #F3F2EE;
      --gray-200:   #E5E3DC;
      --gray-400:   #9CA3AF;
      --gray-600:   #6B7280;
      --gray-800:   #1F2937;
      --white:      #FFFFFF;
      --tab-h:      60px;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(13,27,62,0.10);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans Thai', sans-serif;
      background: var(--gray-50);
      color: var(--gray-800);
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── Init Loading ── */
    #initLoading {
      position: fixed; inset: 0; z-index: 9999;
      background: linear-gradient(135deg, var(--navy), var(--royal));
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: white;
    }
    #initLoading .mascot { font-size: 56px; margin-bottom: 16px; }
    #initLoading .title { font-size: 20px; font-weight: 800; color: var(--gold); }
    #initLoading .sub { font-size: 13px; color: #8899BB; margin-top: 6px; }
    .dots { display: flex; gap: 8px; margin-top: 24px; }
    .dots span {
      width: 8px; height: 8px; background: var(--gold); border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,80%,100%{transform:scale(0.8);opacity:0.4} 40%{transform:scale(1.3);opacity:1} }

    /* ── App Shell ── */
    #app { display: none; }

    /* ── Top Header ── */
    .app-header {
      position: sticky; top: 0; z-index: 100;
      background:
        radial-gradient(circle at 86% 22%, rgba(255,210,46,0.80) 0 16%, transparent 17%),
        linear-gradient(135deg, #061A3A 0%, #073B82 68%, #0C7BFF 100%);
      padding: 20px 16px 22px;
      overflow: hidden;
    }
    .app-header::before {
      content: '';
      position: absolute; right: -18px; bottom: -26px;
      width: 96px; height: 96px; border-radius: 50%;
      background: rgba(255,210,46,0.12);
    }
    .app-header-inner {
      display: flex; align-items: center; justify-content: space-between;
      position: relative; z-index: 2;
    }
    .app-logo { display: flex; align-items: center; gap: 10px; }
    .app-logo .alpaca { font-size: 26px; }
    .app-logo .org { font-size: 10px; color: #8899BB; font-weight: 500; }
    .app-logo .sys { font-size: 14px; color: #FFD22E; font-weight: 800; }
    .header-mascot {
      position: absolute; right: 54px; bottom: -3px;
      width: 78px; height: 78px; z-index: 1; pointer-events: none;
    }
    .header-mascot img {
      width: 100%; height: 100%; object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.22));
    }
    .app-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,0.15); overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      color: #FFD22E; font-weight: 800; font-size: 16px;
      border: 2px solid rgba(197,165,90,0.5);
      flex-shrink: 0; position: relative; z-index: 2;
    }
    .app-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .app-month-strip {
      background: linear-gradient(135deg, #FFD22E 0%, #FFC400 100%);
      color: var(--navy); font-size: 12px; font-weight: 700;
      padding: 5px 16px; text-align: center;
      position: sticky; top: 80px; z-index: 99;
    }

    /* ── Bottom Tab Bar ── */
    .tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: var(--white);
      box-shadow: 0 -2px 16px rgba(0,0,0,0.08);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .tab-btn {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 8px 4px 6px;
      cursor: pointer; border: none; background: none;
      color: var(--gray-400); font-family: inherit;
      font-size: 10px; font-weight: 600;
      transition: color 0.2s;
      gap: 2px;
    }
    .tab-btn .tab-icon { font-size: 20px; line-height: 1; }
    .tab-btn.active { color: #FFD22E; }

    /* ── Content Area ── */
    .tab-content {
      display: none;
      padding: 14px 14px calc(var(--tab-h) + 14px + env(safe-area-inset-bottom, 0px));
      min-height: calc(100vh - 56px);
    }
    .tab-content.active { display: block; }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 12px;
      border: 1px solid rgba(197,165,90,0.08);
    }
    .card-title {
      font-size: 13px; font-weight: 700; color: var(--navy);
      margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title .ct-icon {
      width: 26px; height: 26px; border-radius: 8px;
      background: var(--gold-pale);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    /* ── Hero Profile Card ── */
    .profile-hero {
      background: linear-gradient(135deg, #061A3A 0%, #073B82 70%, #0C7BFF 100%);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 12px;
      position: relative; overflow: hidden;
      box-shadow: 0 14px 30px rgba(13,27,62,0.20);
    }
    .profile-hero::before {
      content: '';
      position: absolute; right: -30px; bottom: -40px;
      width: 130px; height: 130px; border-radius: 50%;
      background: rgba(255,210,46,0.14);
    }
    .profile-hero-row {
      display: flex; align-items: center; gap: 14px; position: relative; z-index: 1;
    }
    .profile-big-avatar {
      width: 56px; height: 56px; border-radius: 14px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(197,165,90,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 800; color: var(--gold);
      flex-shrink: 0; overflow: hidden;
    }
    .profile-big-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .profile-hero-info { flex: 1; min-width: 0; }
    .profile-hero-name { font-size: 18px; font-weight: 800; color: white; }
    .profile-hero-dept { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 2px; }
    .profile-hero-id {
      display: inline-block; margin-top: 8px;
      padding: 4px 10px; border-radius: 999px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      font-size: 10px; color: rgba(255,255,255,0.75); font-weight: 600;
    }

    /* ── Balance Cards ── */
    .balance-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .balance-card {
      border-radius: 14px; padding: 14px 10px;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      text-align: center;
    }
    .balance-card .bc-icon { font-size: 22px; }
    .balance-card .bc-num { font-size: 28px; font-weight: 800; line-height: 1; }
    .balance-card .bc-label { font-size: 11px; font-weight: 600; margin-top: 2px; }
    .balance-card .bc-sub { font-size: 10px; margin-top: 2px; }
    .bc-bar-wrap {
      width: 100%; height: 5px; border-radius: 3px; overflow: hidden;
      margin-top: 6px; background: rgba(0,0,0,0.08);
    }
    .bc-bar { height: 100%; border-radius: 3px; transition: width 0.6s; }

    /* ── Leave History Items ── */
    .leave-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .leave-item:last-child { border-bottom: none; padding-bottom: 0; }
    .leave-type-icon {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .leave-item-info { flex: 1; min-width: 0; }
    .leave-item-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .leave-item-type { font-size: 14px; font-weight: 700; color: var(--navy); }
    .status-pill {
      font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 999px;
      white-space: nowrap; flex-shrink: 0;
    }
    .status-pill.approved { background: var(--green-bg); color: var(--green); }
    .status-pill.pending  { background: var(--orange-bg); color: var(--orange); }
    .status-pill.rejected { background: var(--red-bg); color: var(--red); }
    .leave-item-date { font-size: 12px; color: var(--gray-600); margin-top: 3px; }
    .leave-item-days { font-size: 11px; color: var(--gray-400); margin-top: 2px; }

    /* ── Profile Edit Fields ── */
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--gray-600); margin-bottom: 5px; }
    .field-input {
      width: 100%; padding: 12px 14px;
      border: 1.5px solid var(--gray-200); border-radius: 12px;
      font-size: 14px; font-family: inherit; color: var(--gray-800);
      background: var(--gray-50);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(197,165,90,0.15); background: var(--white); }
    .field-input[readonly] { color: var(--gray-400); background: var(--gray-100); cursor: not-allowed; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: white; border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-primary:disabled { background: var(--gray-400); cursor: not-allowed; }

    .btn-navy {
      width: 100%; padding: 14px;
      background: var(--navy);
      color: var(--gold); border: none; border-radius: 12px;
      font-size: 15px; font-weight: 700; font-family: inherit;
      cursor: pointer; transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-navy:active { opacity: 0.85; }

    /* ── HR Dashboard ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat-box {
      border-radius: 14px; padding: 16px;
      display: flex; flex-direction: column;
    }
    .stat-box .sb-label { font-size: 11px; font-weight: 600; margin-bottom: 6px; }
    .stat-box .sb-num { font-size: 30px; font-weight: 800; line-height: 1; }
    .stat-box .sb-sub { font-size: 11px; margin-top: 4px; }

    .hr-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .hr-table th { background: var(--navy); color: var(--gold); padding: 8px; text-align: left; font-weight: 700; }
    .hr-table td { padding: 8px; border-bottom: 1px solid var(--gray-100); }
    .hr-table tr:last-child td { border-bottom: none; }

    /* ── Register Tab ── */
    .reg-section {
      background: var(--white); border-radius: 18px;
      box-shadow: var(--shadow); padding: 18px; margin-bottom: 14px;
      border: 1px solid rgba(197,165,90,0.08);
    }
    .reg-section-title {
      font-size: 13px; font-weight: 700; color: var(--navy);
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .reg-section-title .rsi {
      width: 28px; height: 28px; background: var(--gold-pale); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0;
    }
    .reg-section-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--gold-pale), transparent);
    }
    .reg-balance-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-top: 6px; }
    .reg-balance-card {
      background: var(--gray-50); border: 1.5px solid var(--gray-200);
      border-radius: 14px; padding: 10px 8px; text-align: center;
    }
    .reg-balance-card .rbc-emoji { font-size: 22px; display: block; margin-bottom: 4px; }
    .reg-balance-card .rbc-label { font-size: 11px; font-weight: 700; color: var(--gray-600); margin-bottom: 6px; }
    .reg-balance-card input[type="number"] {
      width: 100%; padding: 8px 4px; text-align: center;
      font-size: 18px; font-weight: 800; color: var(--navy);
      border: 1.5px solid var(--gray-200); border-radius: 8px;
      font-family: inherit; background: var(--white);
    }
    .status-note-reg {
      display: none; align-items: center; gap: 10px;
      padding: 12px 14px; margin-bottom: 14px;
      background: var(--gold-pale); border: 1px solid rgba(197,165,90,0.35);
      border-left: 4px solid var(--gold); border-radius: 10px;
      font-size: 13px; font-weight: 700; color: var(--navy);
    }
    .status-note-reg.show { display: flex; }
    .info-note-sm {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 12px; background: var(--gold-pale);
      border-radius: 8px; border-left: 3px solid var(--gold); margin-top: 12px;
      font-size: 12px; color: var(--gray-600); line-height: 1.5;
    }
    label .req { color: var(--red); margin-left: 2px; font-size: 11px; }
    label .opt { color: var(--gray-400); margin-left: 3px; font-size: 11px; font-weight: 400; }

    /* ── Empty State ── */
    .empty-state {
      text-align: center; padding: 48px 24px;
      color: var(--gray-400);
    }
    .empty-state .es-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .es-title { font-size: 15px; font-weight: 700; color: var(--gray-600); margin-bottom: 6px; }
    .empty-state .es-sub { font-size: 13px; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: calc(var(--tab-h) + 12px); left: 14px; right: 14px;
      background: var(--navy); color: white;
      padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600;
      z-index: 9000; opacity: 0; transform: translateY(12px);
      transition: all 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Init Loading -->
<div id="initLoading">
  <div class="mascot">🦙</div>
  <div class="title">ระบบลาออนไลน์</div>
  <div class="sub">กำลังโหลด...</div>
  <div class="dots"><span></span><span></span><span></span></div>
</div>

<!-- App -->
<div id="app">
  <!-- Top Header -->
  <div class="app-header">
    <div class="app-header-inner">
      <div class="app-logo">
        <span class="alpaca">🦙</span>
        <div class="title-wrap">
          <div class="org">มหาวิทยาลัยธรรมศาสตร์</div>
          <div class="sys">ระบบลาออนไลน์</div>
        </div>
      </div>
      <div class="app-avatar" id="avatarEl">👤</div>
    </div>
    <div class="header-mascot"><img id="headerMascot" alt=""></div>
  </div>
  <div class="app-month-strip" id="appMonthStrip"></div>

  <!-- Tab Contents -->
  <div id="tab-submit" class="tab-content active">
    <!-- filled by JS -->
  </div>

  <div id="tab-history" class="tab-content">
    <div id="historyContent"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div></div>
  </div>

  <div id="tab-balance" class="tab-content">
    <div id="balanceContent"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div></div>
  </div>

  <div id="tab-profile" class="tab-content">
    <div id="profileContent"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div></div>
  </div>

  <div id="tab-hr" class="tab-content">
    <div id="hrContent"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div></div>
  </div>

  <div id="tab-register" class="tab-content">
    <div id="registerContent"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div></div>
  </div>

  <div id="tab-team" class="tab-content">
    <div id="teamContent"><div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div></div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" data-tab="submit" onclick="switchTab('submit')">
      <span class="tab-icon">📋</span>ยื่นใบลา
    </button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')">
      <span class="tab-icon">📜</span>ประวัติ
    </button>
    <button class="tab-btn" data-tab="balance" onclick="switchTab('balance')">
      <span class="tab-icon">📅</span>วันลา
    </button>
    <button class="tab-btn" data-tab="profile" onclick="switchTab('profile')">
      <span class="tab-icon">👤</span>โปรไฟล์
    </button>
    <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
      <span class="tab-icon">📝</span>ลงทะเบียน
    </button>
    <button class="tab-btn" data-tab="team" id="teamTabBtn" style="display:none" onclick="switchTab('team')">
      <span class="tab-icon">👥</span>ทีม
    </button>
    <button class="tab-btn" data-tab="hr" id="hrTabBtn" style="display:none" onclick="switchTab('hr')">
      <span class="tab-icon">📊</span>HR
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// ── Tab Switching ──
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(el => {
    el.classList.remove('active');
    el.style.display = '';
  });
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  const content = document.getElementById('tab-' + name);
  if (content) content.classList.add('active');
  const btn = document.querySelector(`.tab-btn[data-tab="${name}"]`);
  if (btn) btn.classList.add('active');
  if (!tabLoaded[name]) {
    loadTab(name);
    tabLoaded[name] = true;
  }
}

function loadTab(name) {
  if (name === 'submit')   renderSubmit();
  if (name === 'history')  loadHistory();
  if (name === 'balance')  renderBalance();
  if (name === 'profile')  renderProfile();
  if (name === 'hr')       loadHr();
  if (name === 'register') renderRegister();
  if (name === 'team')     loadTeam();
}

// ── Helpers ──
function getDirectImageUrl(url) {
  if (!url) return '';
  const m = String(url).match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w400`;
  return url;
}
function getThaiMonthYear(d) {
  const months = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  return `${months[d.getMonth()]} ${d.getFullYear() + 543}`;
}

// ── Init ──
async function init() {
  try {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    userId = profile.userId;
    userProfile = profile;
  } catch (err) {
    userId = new URLSearchParams(location.search).get('userId') || 'TEST_USER';
  }

  // set avatar
  if (userProfile && userProfile.pictureUrl) {
    document.getElementById('avatarEl').innerHTML =
      `<img src="${userProfile.pictureUrl}" alt="">`;
  } else if (userProfile && userProfile.displayName) {
    document.getElementById('avatarEl').textContent = userProfile.displayName.charAt(0);
  }

  // header mascot
  const mascotEl = document.getElementById('headerMascot');
  if (mascotEl) {
    const fallback = `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(DEFAULT_MASCOT_SVG)}`;
    mascotEl.onerror = () => { mascotEl.onerror = null; mascotEl.src = fallback; };
    mascotEl.src = getDirectImageUrl(MASCOT_IMAGE_URL) || fallback;
  }
  // month strip
  const monthEl = document.getElementById('appMonthStrip');
  if (monthEl) monthEl.textContent = getThaiMonthYear(new Date());

  // load employee data
  try {
    const r = await fetch(`${GAS_URL}?mode=api&action=employee&userId=${encodeURIComponent(userId)}`);
    const d = await r.json();
    if (d.found) employee = d.employee;
  } catch (e) {}

  // HR / Manager check — ใช้ค่าจาก API
  isHr      = !!(employee && employee.isHr);
  isManager = !!(employee && employee.isManager);
  if (isHr)      document.getElementById('hrTabBtn').style.display = 'flex';
  if (isManager) document.getElementById('teamTabBtn').style.display = 'flex';

  // Show app
  document.getElementById('initLoading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  // Load first tab
  tabLoaded.submit = true;
  renderSubmit();
}

function renderLeaveItem(leave) {
  const typeIcons = { 'ลาพักร้อน':'🏖️','ลากิจ':'🏠','ลาป่วย':'🏥','ลาคลอด':'👶','ลาบวช':'🙏' };
  const icon = typeIcons[leave.leaveType] || '📄';
  const typeBg = { 'ลาพักร้อน':'#EFF6FF','ลากิจ':'#F0FDFA','ลาป่วย':'#F0FDF4','ลาคลอด':'#FDF4FF','ลาบวช':'#FFF7ED' };
  const bg = typeBg[leave.leaveType] || '#F3F4F6';

  let statusClass = 'pending', statusText = '⏳ รอดำเนินการ';
  if (leave.status === 'อนุมัติ')    { statusClass = 'approved'; statusText = '✅ อนุมัติ'; }
  if (leave.status === 'ไม่อนุมัติ') { statusClass = 'rejected'; statusText = '❌ ไม่อนุมัติ'; }

  const days = Number(leave.days) || 0;
  const dayText = leave.period === 'เต็มวัน' || !leave.period
    ? `${days} วันทำการ`
    : `${leave.period} (0.5 วัน)`;

  return `<div class="leave-item">
    <div class="leave-type-icon" style="background:${bg}">${icon}</div>
    <div class="leave-item-info">
      <div class="leave-item-top">
        <div class="leave-item-type">${leave.leaveType||'ไม่ระบุ'}</div>
        <div class="status-pill ${statusClass}">${statusText}</div>
      </div>
      <div class="leave-item-date">📅 ${leave.startDate}${leave.endDate && leave.endDate !== leave.startDate ? ' — ' + leave.endDate : ''}</div>
      <div class="leave-item-days">⏱ ${dayText}${leave.remark ? ' · ' + leave.remark : ''}</div>
    </div>
  </div>`;
}

async function saveProfile() {
  const name = document.getElementById('pName').value.trim();
  const dept = document.getElementById('pDept').value.trim();
  const email = document.getElementById('pEmail').value.trim();
  const phone = document.getElementById('pPhone').value.trim();
  if (!name || !dept) { showToast('⚠️ กรุณากรอกชื่อและแผนก'); return; }

  const payload = {
    source: 'liff', action: 'register',
    userId, name, department: dept, email, phone,
    employeeId: employee ? employee.id : '',
    managerUserId: employee ? employee.managerUserId : '',
    annualLeave: employee ? employee.annualLeave : '',
    personalLeave: employee ? employee.personalLeave : '',
    sickLeave: employee ? employee.sickLeave : '',
  };
  try {
    const r = await fetch(GAS_URL, { method:'POST', headers:{'Content-Type':'text/plain'}, body:JSON.stringify(payload) });
    const d = await r.json();
    if (d.success) {
      showToast('✅ บันทึกข้อมูลสำเร็จ');
      if (employee) { employee.name = name; employee.department = dept; employee.email = email; employee.phone = phone; }
    } else { showToast('❌ ' + (d.message||'บันทึกไม่สำเร็จ')); }
  } catch (e) { showToast('❌ เชื่อมต่อไม่สำเร็จ'); }
}

function openRegister() {
  const url = `${GAS_URL}?mode=register&userId=${encodeURIComponent(userId)}`;
  if (typeof liff !== 'undefined' && liff.isInClient()) {
    liff.openWindow({ url, external: true });

}

async function loadTeam() {
  const el = document.getElementById('teamContent');
  el.innerHTML = '<div class="empty-state"><div class="es-icon">⏳</div><div class="es-title">กำลังโหลด...</div></div>';

  let myLeaves = [], teamLeaves = [];
  try {
    const [r1, r2] = await Promise.all([
      fetch(`${GAS_URL}?mode=api&action=my_leaves&userId=${encodeURIComponent(userId)}&limit=20`),
      fetch(`${GAS_URL}?mode=api&action=team_requests&managerId=${encodeURIComponent(userId)}`)
    ]);
    const d1 = await r1.json();
    const d2 = await r2.json();
    myLeaves   = d1.leaves  || [];
    teamLeaves = d2.leaves  || [];
  } catch (e) {}

  const pendingTeam = teamLeaves.filter(l => l.status === 'รอการอนุมัติ' || l.status === 'รออนุมัติระดับ 2');
  const otherTeam   = teamLeaves.filter(l => l.status !== 'รอการอนุมัติ' && l.status !== 'รออนุมัติระดับ 2');

  el.innerHTML = `
    ${pendingTeam.length ? `
    <div class="card" style="border-left:4px solid var(--orange)">
      <div class="card-title"><span class="ct-icon">⏳</span>รออนุมัติ (${pendingTeam.length} รายการ)</div>
      ${pendingTeam.map(l => renderTeamLeaveItem(l, true)).join('')}
    </div>` : `
    <div class="card" style="border-left:4px solid var(--green)">
      <div style="display:flex;align-items:center;gap:10px;padding:4px 0">
        <span style="font-size:24px">✅</span>
        <span style="font-size:13px;font-weight:700;color:var(--green)">ไม่มีคำขอรออนุมัติ</span>
      </div>
    </div>`}

    ${otherTeam.length ? `
    <div class="card">
      <div class="card-title"><span class="ct-icon">📋</span>ประวัติทีม (${otherTeam.length} รายการ)</div>
      ${otherTeam.slice(0,15).map(l => renderTeamLeaveItem(l, false)).join('')}
    </div>` : ''}

    <div class="card">
      <div class="card-title"><span class="ct-icon">📜</span>ประวัติการลาของฉัน</div>
      ${myLeaves.length
        ? myLeaves.map(renderLeaveItem).join('')
        : '<div style="text-align:center;padding:16px;color:var(--gray-400);font-size:13px">ยังไม่มีประวัติการลา</div>'}
    </div>`;
}

function renderTeamLeaveItem(leave, showApprove) {
  const typeIcons = { 'ลาพักร้อน':'🏖️','ลากิจ':'🏠','ลาป่วย':'🏥','ลาคลอด':'👶','ลาบวช':'🙏' };
  const icon = typeIcons[leave.leaveType] || '📄';
  let statusClass = 'pending', statusText = '⏳ รอดำเนินการ';
  if (leave.status === 'อนุมัติ')    { statusClass = 'approved'; statusText = '✅ อนุมัติ'; }
  if (leave.status === 'ไม่อนุมัติ') { statusClass = 'rejected'; statusText = '❌ ไม่อนุมัติ'; }
  const days = Number(leave.days) || 0;
  return `<div class="leave-item">
    <div class="leave-type-icon" style="background:var(--gray-100)">${icon}</div>
    <div class="leave-item-info">
      <div class="leave-item-top">
        <div style="font-size:13px;font-weight:700;color:var(--navy)">${leave.name||'ไม่ระบุ'}</div>
        <div class="status-pill ${statusClass}">${statusText}</div>
      </div>
      <div style="font-size:12px;color:var(--gray-600);margin-top:2px">${leave.leaveType||'—'} · ${days} วัน</div>
      <div class="leave-item-date">📅 ${leave.startDate||'—'}${leave.endDate&&leave.endDate!==leave.startDate?' — '+leave.endDate:''}</div>
      ${leave.remark ? `<div class="leave-item-days">💬 ${leave.remark}</div>` : ''}
    </div>
  </div>`;
}

    <div class="reg-section">

      <div class="field">

      <div class="field">

async function submitRegister() {
  const name = (document.getElementById('reg_name').value||'').trim();
  const dept = (document.getElementById('reg_department').value||'').trim();
  if (!name) { showToast('กรุณากรอกชื่อ-นามสกุล'); return; }
  if (!dept) { showToast('กรุณากรอกแผนก / ส่วนงาน'); return; }

  const btn = document.getElementById('regSubmitBtn');
  btn.disabled = true;
  btn.textContent = '⏳ กำลังบันทึก...';

  const g = id => (document.getElementById(id)||{}).value||'';
  try {
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        source: 'liff', action: 'register',
        userId,
        employeeId:          g('reg_employeeId'),
        name,
        department:          dept,
        managerUserId:       g('reg_manager'),
        secondManagerUserId: g('reg_manager2'),
        email:               g('reg_email'),
        phone:               g('reg_phone'),
        annualLeave:   Number(g('reg_annual')   || 10),
        personalLeave: Number(g('reg_personal') || 6),
        sickLeave:     Number(g('reg_sick')     || 30),
      })
    });
    const result = await res.json();
    if (!result.success) throw new Error(result.message || 'บันทึกไม่สำเร็จ');

    // อัปเดต employee ใน memory และ reload แท็บอื่น
    employee = { ...employee, name, department: dept,
      managerUserId: g('reg_manager'), secondManagerUserId: g('reg_manager2'),
      email: g('reg_email'), phone: g('reg_phone'),
      annualLeave: Number(g('reg_annual')), personalLeave: Number(g('reg_personal')), sickLeave: Number(g('reg_sick'))
    };
    tabLoaded.submit = false; tabLoaded.balance = false; tabLoaded.profile = false;

    showToast('✅ บันทึกข้อมูลสำเร็จ!');
    btn.textContent = '✅ บันทึกแล้ว';
    document.getElementById('regStatusNote') && document.getElementById('regStatusNote').classList.add('show');
  } catch (err) {
    showToast(err.message || String(err));
    btn.disabled = false;
    btn.textContent = '🦙 บันทึกข้อมูล';
  }
}

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Start ──
init();
</script>
